<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GenAI Engineer Roadmap 2025–26</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F8FAFC;
    --bg2: #EEF2F7;
    --bg3: #FFFFFF;
    --bg4: #F1F5F9;
    --border: #D1D9E6;
    --border2: #B0BCCF;
    --text: #1E293B;
    --text2: #334155;
    --text3: #475569;
    --text4: #64748B;
    --text5: #64748B;
    --heading: #0F172A;
    --dot-color: #C8D3E0;
    --tabs-bg: #E8EDF5;
    --tool-name-color: #1E293B;
    --jump-label-color: #94A3B8;
    --spotlight-border: #BFDBFE;
    --item-border: #D1D9E6;
  }
  html[data-theme="dark"] {
    --bg: #060A10;
    --bg2: #08101A;
    --bg3: #0A1525;
    --bg4: #07101C;
    --border: #0F1E2D;
    --border2: #1E2D3D;
    --text: #CBD5E1;
    --text2: #94A3B8;
    --text3: #64748B;
    --text4: #475569;
    --text5: #334155;
    --heading: #F1F5F9;
    --dot-color: #1E2D3D;
    --tabs-bg: #0A1525;
    --tool-name-color: #E2E8F0;
    --jump-label-color: #1E2D3D;
    --spotlight-border: #1E3A5F;
    --item-border: #0F1E2D;
  }
  html, body { height: 100%; }
  body {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Header ── */
  #header {
    padding: 22px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
    background-size: 24px 24px;
    flex-shrink: 0;
  }
  #header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--heading);
    line-height: 1.2;
  }
  #header h1 span { color: var(--active-color, #38BDF8); }
  #header p { font-size: 10px; letter-spacing: 3px; color: var(--text5); margin-top: 5px; text-transform: uppercase; }
  .view-tabs { display: flex; gap: 3px; background: var(--tabs-bg); padding: 3px; border-radius: 7px; border: 1px solid var(--border); align-self: flex-start; }
  .view-tab {
    cursor: pointer; padding: 7px 16px; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; border-radius: 4px; border: none; background: transparent;
    color: var(--text4); font-family: 'IBM Plex Mono', monospace; transition: all .2s;
  }
  .view-tab.active { color: #060A10; background: var(--active-color, #38BDF8); }

  /* ── Layout ── */
  #app { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 210px; flex-shrink: 0; overflow-y: auto;
    background: var(--bg2); border-right: 1px solid var(--border);
    padding: 14px 10px;
  }
  .phase-pill {
    padding: 9px 10px; border-radius: 6px; margin-bottom: 3px;
    cursor: pointer; transition: all .2s; border: 1px solid transparent;
    opacity: 0.45;
  }
  .phase-pill:hover { opacity: 0.75; }
  .phase-pill.active { opacity: 1; }
  .phase-pill-inner { display: flex; align-items: center; gap: 8px; }
  .phase-icon { font-size: 13px; flex-shrink: 0; }
  .phase-num { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1px; }
  .phase-name { font-size: 10px; font-weight: 500; color: var(--text3); }
  .phase-pill.active .phase-name { color: var(--heading); }

  /* ── Content area ── */
  #content-wrap { flex: 1; display: flex; overflow: hidden; }

  /* ── Topics panel ── */
  #topics {
    flex: 1; overflow-y: auto; padding: 24px 28px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .phase-header { margin-bottom: 20px; }
  .phase-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .phase-big-icon { font-size: 18px; }
  .phase-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(15px, 2vw, 20px); font-weight: 700; color: var(--heading); }
  .phase-sub { font-size: 11px; color: var(--text4); margin-top: 2px; }
  .phase-divider { height: 2px; border-radius: 1px; margin-top: 10px; }

  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .section-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .section-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; margin-bottom: 10px; }
  .topic-item { display: flex; gap: 7px; padding: 4px 0; font-size: 11px; color: var(--text2); line-height: 1.5; }
  .topic-item:not(:last-child) { border-bottom: 1px solid var(--border); }
  .topic-arrow { flex-shrink: 0; opacity: 0.65; font-style: normal; }

  /* ── Tools panel ── */
  #tools-panel {
    width: 230px; flex-shrink: 0; overflow-y: auto;
    padding: 24px 18px; background: var(--bg4);
    border-left: 1px solid var(--border);
  }
  .panel-label { font-size: 9px; letter-spacing: 3px; color: var(--text5); text-transform: uppercase; margin-bottom: 14px; }
  .tool-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 11px 13px; margin-bottom: 7px;
    transition: transform .2s, box-shadow .2s;
  }
  .tool-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.4); }
  .tool-name { font-size: 12px; color: var(--tool-name-color); margin-bottom: 3px; }
  .tool-tag { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .65; }

  .phase-stats {
    border-radius: 8px; padding: 13px; margin-top: 18px;
  }
  .stats-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 7px; font-weight: 500; }
  .stats-val { font-size: 10px; color: var(--text3); line-height: 1.9; }

  .jump-label { font-size: 9px; letter-spacing: 2px; color: var(--jump-label-color); text-transform: uppercase; margin-bottom: 9px; margin-top: 18px; }
  .jump-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; opacity: .35; transition: opacity .2s; }
  .jump-item:hover { opacity: .65; }
  .jump-item.active { opacity: 1; }
  .jump-bar { width: 14px; height: 2px; border-radius: 1px; flex-shrink: 0; }
  .jump-text { font-size: 9px; color: var(--text4); }
  .jump-item.active .jump-text { color: inherit; }

  /* ── All Tools view ── */
  #all-tools-view { display: none; overflow-y: auto; padding: 28px 32px; flex: 1; }
  #all-tools-view.visible { display: block; }
  .all-tools-header { margin-bottom: 24px; }
  .all-tools-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--heading); margin-bottom: 4px; }
  .all-tools-sub { font-size: 10px; letter-spacing: 2px; color: var(--text5); text-transform: uppercase; }
  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; }
  .tools-group-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
  .tools-group-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    border-radius: 4px; padding: 3px 9px; font-size: 10px; color: var(--text2);
  }
  .spotlight-section {
    margin-top: 28px; background: var(--bg3);
    border: 1px solid var(--spotlight-border); border-radius: 10px; padding: 22px;
  }
  .spotlight-title { font-size: 9px; letter-spacing: 3px; color: #38BDF8; text-transform: uppercase; margin-bottom: 14px; }
  .spotlight-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 9px; }
  .spotlight-card { background: var(--bg); border: 1px solid var(--spotlight-border); border-radius: 6px; padding: 11px 13px; }
  .spotlight-name { font-size: 12px; color: #38BDF8; margin-bottom: 2px; }
  .spotlight-desc { font-size: 10px; color: var(--text4); }

  /* ── Light mode color overrides ── */
  html:not([data-theme="dark"]) .tool-tag {
    opacity: 1;
    color: var(--text3) !important;
  }
  html:not([data-theme="dark"]) .phase-num {
    opacity: 1;
  }
  html:not([data-theme="dark"]) .phase-pill {
    opacity: 0.6;
  }
  html:not([data-theme="dark"]) .phase-pill:hover {
    opacity: 0.85;
  }
  html:not([data-theme="dark"]) .phase-pill.active {
    opacity: 1;
  }
  html:not([data-theme="dark"]) .topic-arrow {
    opacity: 0.85;
  }
  html:not([data-theme="dark"]) .jump-item {
    opacity: 0.55;
  }
  html:not([data-theme="dark"]) .jump-item:hover {
    opacity: 0.8;
  }
  html:not([data-theme="dark"]) .jump-item.active {
    opacity: 1;
  }
  html:not([data-theme="dark"]) .jump-text {
    color: var(--text3);
  }
  html:not([data-theme="dark"]) .panel-label {
    color: var(--text3);
  }
  html:not([data-theme="dark"]) .phase-sub {
    color: var(--text3);
  }
  html:not([data-theme="dark"]) .stats-val {
    color: var(--text3);
  }
  html:not([data-theme="dark"]) .spotlight-desc {
    color: var(--text3);
  }
  html:not([data-theme="dark"]) .all-tools-sub {
    color: var(--text3);
  }

  /* ── Theme Toggle ── */
  #theme-toggle {
    cursor: pointer; border: 1px solid var(--border2); background: var(--bg3);
    border-radius: 20px; padding: 6px 14px; font-size: 11px; font-family: 'IBM Plex Mono', monospace;
    color: var(--text3); display: flex; align-items: center; gap: 7px;
    transition: all .2s; align-self: flex-start; white-space: nowrap;
  }
  #theme-toggle:hover { border-color: var(--active-color, #38BDF8); color: var(--active-color, #38BDF8); }
  #theme-toggle .toggle-track {
    width: 28px; height: 15px; border-radius: 8px; background: var(--border2);
    position: relative; transition: background .2s; flex-shrink: 0;
  }
  html[data-theme="dark"] #theme-toggle .toggle-track { background: var(--active-color, #38BDF8); }
  #theme-toggle .toggle-knob {
    width: 11px; height: 11px; border-radius: 50%; background: #fff;
    position: absolute; top: 2px; left: 2px; transition: transform .2s;
  }
  html[data-theme="dark"] #theme-toggle .toggle-knob { transform: translateX(13px); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    #sidebar { width: 52px; }
    .phase-name, .phase-num { display: none; }
    #tools-panel { width: 180px; }
    body { overflow: auto; }
    #app { flex-direction: column; overflow: auto; height: auto; }
    #content-wrap { flex-direction: column; overflow: visible; }
    #topics { overflow: visible; }
    #tools-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <h1>GenAI Engineer <span>·</span> Full Roadmap</h1>
    <p>3+ years experience &nbsp;·&nbsp; 9 phases &nbsp;·&nbsp; 36 topics &nbsp;·&nbsp; 60+ tools</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <div class="view-tabs">

      <button class="view-tab" onclick="setView('tools')">◈ All Tools</button>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()">
      <span id="theme-label">☀ Light</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
    </button>
  </div>
</div>

<div id="app">

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Roadmap content -->
  <div id="content-wrap">
    <div id="topics"></div>

  <div id="all-tools-view"></div>

</div>

let activePhaseId = "llm-core";
let currentView = "roadmap";

function getPhase(id) { return roadmap.find(p => p.id === id); }

function setActiveColor(color) {
  document.documentElement.style.setProperty('--active-color', color);
  document.querySelector('#header h1 span').style.color = color;
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = roadmap.map(p => `
    <div class="phase-pill ${p.id===activePhaseId?'active':''}"
         style="${p.id===activePhaseId?`background:${p.color}18;border-color:${p.color}40`:''}"
         onclick="selectPhase('${p.id}')">
      <div class="phase-pill-inner">
        <span class="phase-icon" style="color:${p.color}">${p.icon}</span>
        <div>
          <div class="phase-num" style="color:${p.color}">PHASE ${p.phase}</div>
          <div class="phase-name">${p.title}</div>
        </div>
      </div>
    </div>`).join('');
}

function renderTopics() {
  const p = getPhase(activePhaseId);
  const el = document.getElementById('topics');
  el.innerHTML = `
    <div class="phase-header">
      <div class="phase-header-top">
        <span class="phase-big-icon">${p.icon}</span>
        <div>
          <div class="phase-title">${p.title}</div>
          <div class="phase-sub">${p.subtitle}</div>
        </div>
      </div>
      <div class="phase-divider" style="background:linear-gradient(90deg,${p.color},transparent)"></div>
    </div>
    <div class="sections-grid">
      ${p.sections.map(sec => `
        <div class="section-card" style="border-top:2px solid ${p.color}60">
          <div class="section-title" style="color:${p.color}">${sec.title}</div>
          ${sec.items.map((item,i) => `
            <div class="topic-item" style="${i<sec.items.length-1?'border-bottom:1px solid var(--item-border)':''}">
              <em class="topic-arrow" style="color:${p.color}">›</em>
              ${item}
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
  // re-trigger animation
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeIn .3s ease';
}

function renderToolsPanel() {
  const p = getPhase(activePhaseId);
  const el = document.getElementById('tools-panel');
  const totalTopics = p.sections.reduce((a,s) => a+s.items.length, 0);
  el.innerHTML = `
    <div class="panel-label">Key Tools</div>
    ${p.tools.map(t => `
      <div class="tool-card" style="border-left:3px solid ${p.color}">
        <div class="tool-name">${t.name}</div>
        <div class="tool-tag" style="color:${p.color}">${t.tag}</div>
      </div>`).join('')}
    <div class="phase-stats" style="background:${p.color}0F;border:1px solid ${p.color}25">
      <div class="stats-label" style="color:${p.color}">Phase Stats</div>
      <div class="stats-val">
        <div>${totalTopics} topics</div>
        <div>${p.sections.length} categories</div>
        <div>${p.tools.length} key tools</div>
      </div>
    </div>
    <div class="jump-label">Jump to</div>
    ${roadmap.map(r => `
      <div class="jump-item ${r.id===activePhaseId?'active':''}" onclick="selectPhase('${r.id}')"
           style="${r.id===activePhaseId?`color:${r.color}`:''}">
        <div class="jump-bar" style="background:${r.color}"></div>
        <span class="jump-text">${r.title}</span>
      </div>`).join('')}`;
}

function renderAllTools() {
  const el = document.getElementById('all-tools-view');

    <div class="all-tools-header">
      <div class="all-tools-title">Complete Tool Arsenal</div>
      <div class="all-tools-sub">Every tool a GenAI Engineer needs to know</div>
    </div>
    <div class="tools-grid">
      ${allToolGroups.map((g,gi) => {
        const color = roadmap[gi % roadmap.length].color;
        return `
          <div class="tools-group-card" style="border-top:2px solid ${color}">
            <div class="tools-group-title" style="color:${color}">${g.group}</div>
            <div class="chip-wrap">
              ${g.tools.map(t => `
                <span class="chip" style="background:${color}15;border:1px solid ${color}30">${t}</span>
              `).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>
    <div class="spotlight-section">
      <div class="spotlight-title">★ Spotlight Tools — Must Try</div>
      <div class="spotlight-grid">
        ${spotlightTools.map(t => `
          <div class="spotlight-card">
            <div class="spotlight-name">${t.name}</div>
            <div class="spotlight-desc">${t.desc}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function selectPhase(id) {
  activePhaseId = id;
  const p = getPhase(id);
  setActiveColor(p.color);
  renderSidebar();
  renderTopics();
  renderToolsPanel();
}

function setView(v) {
  currentView = v;
  const roadmapEl = document.getElementById('content-wrap');
  const allToolsEl = document.getElementById('all-tools-view');
  const sidebarEl = document.getElementById('sidebar');
  const tabs = document.querySelectorAll('.view-tab');
  tabs.forEach((t,i) => t.classList.toggle('active', (i===0 && v==='roadmap') || (i===1 && v==='tools')));

  if(v === 'roadmap') {
    roadmapEl.style.display = 'flex';
    allToolsEl.classList.remove('visible');
    sidebarEl.style.display = 'block';
  } else {
    roadmapEl.style.display = 'none';
    allToolsEl.classList.add('visible');
    sidebarEl.style.display = 'none';
    renderAllTools();
  }
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-label').textContent = isDark ? '☀ Light' : '☾ Dark';
  // Re-render so JS-injected inline borders pick up new color
  renderTopics();
  renderToolsPanel();
}

// Initial render
selectPhase('llm-core');
